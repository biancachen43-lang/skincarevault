<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SkincareVault">
<meta name="theme-color" content="#534AB7">
<title>SkincareVault</title>
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;
  --teal:#1D9E75;--teal-light:#E1F5EE;
  --amber:#EF9F27;--amber-light:#FAEEDA;
  --coral:#D85A30;--coral-light:#FAECE7;
  --red:#E24B4A;--red-light:#FCEBEB;
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f2;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;}
.app{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.notif-wrap{display:flex;align-items:center;gap:5px;}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:none;}
.notif-dot.show{display:block;}
.notif-lbl{font-size:11px;color:var(--text2);}
.nav{display:flex;background:var(--bg2);border-bottom:0.5px solid var(--border);position:sticky;top:57px;z-index:10;}
.nav-btn{flex:1;padding:10px 2px 8px;font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.nav-btn.active{color:var(--purple);}
.nav-icon{font-size:18px;}
.content{padding:14px;flex:1;}

.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.section-label{font-size:12px;font-weight:500;color:var(--text2);}
.add-btn{background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.stat{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;}
.stat-n{font-size:20px;font-weight:600;color:var(--text);}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;}

.skin-banner{background:linear-gradient(135deg,var(--purple-light),var(--teal-light));border:0.5px solid var(--purple-mid);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.skin-val{font-size:13px;font-weight:600;color:#3C3489;}
.skin-sub{font-size:11px;color:var(--purple);margin-top:2px;}
.skin-btn{font-size:11px;color:var(--purple);background:white;border:0.5px solid var(--purple-mid);border-radius:20px;padding:4px 10px;cursor:pointer;}

.alert-banner{border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:flex-start;gap:8px;}
.alert-warn{background:var(--amber-light);border:0.5px solid var(--amber);color:#633806;}
.alert-danger{background:var(--red-light);border:0.5px solid var(--red);color:#791F1F;}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.alert-title{font-weight:600;margin-bottom:2px;}

.product-list{display:flex;flex-direction:column;gap:8px;}
.pcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:12px;padding:11px 13px;cursor:pointer;}
.pcard-emoji{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.pcard-emoji img{width:100%;height:100%;object-fit:cover;}
.pcard-body{flex:1;min-width:0;}
.pcard-brand{font-size:10px;color:var(--text2);}
.pcard-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:5px;}
.pbar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}
.tok{background:var(--teal-light);color:#085041;}
.twarn{background:var(--amber-light);color:#633806;}
.tdanger{background:var(--red-light);color:#791F1F;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 36px;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:600;color:var(--text);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);line-height:1;padding:0;}
.fl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.fi{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);margin-bottom:12px;-webkit-appearance:none;}
.fi:focus{outline:none;border-color:var(--purple);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tabs{display:flex;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;}
.tab-btn{flex:1;padding:9px 4px;font-size:12px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--text2);}
.tab-btn.active{background:var(--purple);color:white;font-weight:600;}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:12px;cursor:pointer;background:var(--bg3);position:relative;min-height:90px;}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:28px;margin-bottom:6px;}
.upload-text{font-size:13px;color:var(--text2);}
.sbox{border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.5;}
.sloading{background:var(--purple-light);border:0.5px solid var(--purple-mid);color:var(--purple);}
.ssuccess{background:var(--teal-light);border:0.5px solid #5DCAA5;color:#085041;}
.swarn{background:var(--amber-light);border:0.5px solid var(--amber);color:#633806;}
.search-wrap{display:flex;gap:8px;margin-bottom:10px;}
.search-input{flex:1;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);-webkit-appearance:none;}
.search-input:focus{outline:none;border-color:var(--purple);}
.search-btn{background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:500;}
.search-btn:disabled{opacity:.5;}
.rcard{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px;cursor:pointer;background:var(--bg2);}
.rcard.sel{border-color:var(--purple);background:var(--purple-light);}
.rcard-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.rcard-brand{font-size:11px;color:var(--text2);margin-bottom:4px;}
.rcard-desc{font-size:11px;color:var(--text2);line-height:1.5;}
.rcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.rtag{font-size:10px;padding:2px 7px;background:var(--bg3);color:var(--text2);border-radius:8px;}
.submit-btn{width:100%;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}
.divider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}

.det-hero{width:100%;height:160px;background:var(--bg3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:56px;margin-bottom:14px;overflow:hidden;}
.det-hero img{width:100%;height:100%;object-fit:cover;}
.det-brand{font-size:12px;color:var(--text2);}
.det-name{font-size:19px;font-weight:600;color:var(--text);margin-bottom:14px;}
.det-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.det-k{color:var(--text2);}
.det-v{color:var(--text);font-weight:500;}
.infobox{border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;}
.infobox-purple{background:var(--purple-light);border:0.5px solid var(--purple-mid);}
.infobox-teal{background:var(--teal-light);border:0.5px solid #5DCAA5;}
.infobox-amber{background:var(--amber-light);border:0.5px solid var(--amber);}
.infobox-coral{background:var(--coral-light);border:0.5px solid #F0997B;}
.infobox-title{font-size:11px;font-weight:600;margin-bottom:6px;}
.infobox-purple .infobox-title{color:var(--purple);}
.infobox-teal .infobox-title{color:#085041;}
.infobox-amber .infobox-title{color:#633806;}
.infobox-coral .infobox-title{color:#993C1D;}
.infobox-body{font-size:12px;line-height:1.7;}
.infobox-purple .infobox-body{color:#3C3489;}
.infobox-teal .infobox-body{color:#0F6E56;}
.infobox-amber .infobox-body{color:#633806;}
.infobox-coral .infobox-body{color:#993C1D;}
.del-btn{width:100%;background:none;border:0.5px solid #F09595;color:#A32D2D;border-radius:var(--radius-sm);padding:11px;font-size:13px;cursor:pointer;margin-top:12px;font-family:inherit;}

.advice-seg{display:flex;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;}
.aseg-btn{flex:1;padding:9px 2px;font-size:11px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--text2);}
.aseg-btn.active{background:var(--purple);color:white;font-weight:600;}
.routine-step{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--purple);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px;}
.step-body{flex:1;}
.step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.step-desc{font-size:12px;color:var(--text2);line-height:1.6;}
.step-product{font-size:11px;color:var(--purple);margin-top:4px;font-weight:500;}
.condition-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.cond-btn{padding:11px 8px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;text-align:center;background:var(--bg2);color:var(--text);font-family:inherit;}
.compat-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.compat-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.compat-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.compat-desc{font-size:12px;color:var(--text2);line-height:1.5;}

.opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.opt-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.opt-btn{padding:10px 6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;text-align:center;background:var(--bg2);color:var(--text);font-family:inherit;}
.opt-btn.sel{background:var(--purple-light);border-color:#7F77DD;color:#3C3489;font-weight:600;}
.save-btn{width:100%;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}
.advice-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:8px;}
.ac-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ac-emoji{font-size:16px;}
.ac-title{font-size:13px;font-weight:600;color:var(--text);}
.ac-body{font-size:12px;color:var(--text2);line-height:1.7;}

.dot-anim{animation:blink 1s infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:14px;}
.empty-icon{font-size:36px;margin-bottom:10px;}
.ghost-btn{width:100%;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;margin-top:8px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">✨ SkincareVault</div>
      <div class="topbar-sub" id="topbar-date"></div>
    </div>
    <div class="notif-wrap">
      <div class="notif-dot" id="notif-dot"></div>
      <span class="notif-lbl" id="notif-lbl"></span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="gotoTab('home')" id="tab-home"><span class="nav-icon">🏠</span>首頁</button>
    <button class="nav-btn" onclick="gotoTab('products')" id="tab-products"><span class="nav-icon">🧴</span>產品庫</button>
    <button class="nav-btn" onclick="gotoTab('advice')" id="tab-advice"><span class="nav-icon">📋</span>保養建議</button>
    <button class="nav-btn" onclick="gotoTab('skin')" id="tab-skin"><span class="nav-icon">✨</span>膚質</button>
  </div>
  <div class="content" id="main-content"></div>
  <div id="modal-root"></div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const API_ENDPOINT = '/api/claude'; // 走自己的後端，不暴露 key

// ── STATE ──────────────────────────────────────────────────
const STORAGE_KEY = 'skincarevault_v1';
function loadState() { try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){} return null; }
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }

const DEFAULT = {
  tab:'home',
  products:[
    {id:1,brand:'Laneige',name:'水凝保濕乳霜',category:'乳霜',openedDate:'2024-10-01',pao:12,emoji:'🫙',advice:'適合乾肌晚間使用，塗抹於精華後鎖住水分。',ingredients:'甘油、神經醯胺、玻尿酸',imgData:null},
    {id:2,brand:'SK-II',name:'神仙水（青春露）',category:'化妝水',openedDate:'2024-11-15',pao:6,emoji:'💧',advice:'含豐富 Pitera，洗臉後第一步使用，改善膚質。',ingredients:'Pitera、菸鹼醯胺',imgData:null},
    {id:3,brand:'Sulwhasoo',name:'人蔘精華',category:'精華',openedDate:'2024-12-01',pao:12,emoji:'🌿',advice:'富含紅蔘，適合熟齡肌使用。',ingredients:'紅蔘萃取、甘草萃取',imgData:null},
  ],
  skin:{type:'混合肌',concerns:['毛孔','暗沉']},
  nextId:4,
};
let state = loadState() || JSON.parse(JSON.stringify(DEFAULT));

// ── MODAL / ADD STATE ──────────────────────────────────────
let addMode='search', currentImgData=null, searchResults=[], selectedResult=null, isSearching=false;
let currentAdviceTab='morning', currentConditionResult=null;

// ── UTILS ──────────────────────────────────────────────────
const daysLeft=(d,p)=>{const e=new Date(d);e.setMonth(e.getMonth()+p);return Math.floor((e-new Date())/86400000);};
const expStatus=d=>d<0?'expired':d<=30?'danger':d<=60?'warn':'ok';
const expColor=s=>s==='ok'?'#1D9E75':s==='warn'?'#EF9F27':'#E24B4A';
const expPct=(d,p)=>{const o=new Date(d),e=new Date(d);e.setMonth(e.getMonth()+p);return Math.min(100,Math.max(0,Math.round(((new Date()-o)/(e-o))*100)));};
const tagCls=s=>s==='ok'?'tok':s==='warn'?'twarn':'tdanger';
const tagTxt=d=>d<0?'已過期':d<=60?`剩 ${d} 天`:'良好';
const today=()=>new Date().toISOString().split('T')[0];
const fmt=s=>s?s.replace(/-/g,'/'):'—';

async function callClaude(prompt) {
  const res = await fetch(API_ENDPOINT, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1500, messages:[{role:'user',content:prompt}]})
  });
  if (!res.ok) throw new Error('API '+res.status);
  const data = await res.json();
  return (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
}
function parseJSON(raw) {
  const c=raw.replace(/```json|```/g,'').trim();
  const s=c.indexOf('['),e=c.lastIndexOf(']');
  if(s>=0&&e>=0) return JSON.parse(c.slice(s,e+1));
  const s2=c.indexOf('{'),e2=c.lastIndexOf('}');
  return JSON.parse(c.slice(s2,e2+1));
}

// ── ROUTING ────────────────────────────────────────────────
function gotoTab(t) {
  state.tab=t; saveState();
  ['home','products','advice','skin'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  render();
}
function render() {
  document.getElementById('main-content').innerHTML =
    state.tab==='home'?renderHome():
    state.tab==='products'?renderProducts():
    state.tab==='advice'?renderAdvice():renderSkin();
  updateTopbar();
}
function updateTopbar() {
  const d=new Date();
  document.getElementById('topbar-date').textContent=d.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
  const urgent=state.products.filter(p=>{const d=daysLeft(p.openedDate,p.pao);return d>=0&&d<=14;});
  const expired=state.products.filter(p=>daysLeft(p.openedDate,p.pao)<0);
  const n=urgent.length+expired.length;
  document.getElementById('notif-dot').classList.toggle('show',n>0);
  document.getElementById('notif-lbl').textContent=n>0?`${n} 項需注意`:'';
}

// ── HOME ───────────────────────────────────────────────────
function renderHome() {
  const total=state.products.length;
  const expiring=state.products.filter(p=>{const d=daysLeft(p.openedDate,p.pao);return d>=0&&d<=30;}).length;
  const expired=state.products.filter(p=>daysLeft(p.openedDate,p.pao)<0).length;
  const ok=state.products.filter(p=>expStatus(daysLeft(p.openedDate,p.pao))==='ok').length;
  const soon=state.products.filter(p=>{const d=daysLeft(p.openedDate,p.pao);return d>=0&&d<=14;});
  let alerts='';
  if(expired>0) alerts+=`<div class="alert-banner alert-danger"><span class="alert-icon">⚠</span><div><div class="alert-title">${expired} 個產品已過期</div>請儘快更換，以免刺激肌膚</div></div>`;
  if(soon.length>0) alerts+=`<div class="alert-banner alert-warn"><span class="alert-icon">⏰</span><div><div class="alert-title">${soon.map(p=>p.name).join('、')} 即將到期</div>建議優先使用以免浪費</div></div>`;
  const sorted=[...state.products].sort((a,b)=>daysLeft(a.openedDate,a.pao)-daysLeft(b.openedDate,b.pao)).slice(0,4);
  return `
    <div class="skin-banner" onclick="gotoTab('skin')">
      <div><div class="skin-val">${state.skin.type}</div><div class="skin-sub">困擾：${state.skin.concerns.join('、')} · 點擊更新</div></div>
      <button class="skin-btn">設定 →</button>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">產品總數</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--amber)">${expiring}</div><div class="stat-l">即將過期</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--red)">${expired}</div><div class="stat-l">已過期</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--purple)">${ok}</div><div class="stat-l">狀態良好</div></div>
    </div>

function renderAdvice() {

    </div>
    <div id="advice-content">${renderAdviceContent()}</div>`;
}
function setAdviceTab(t) {
  currentAdviceTab=t;
  document.querySelectorAll('.aseg-btn').forEach((b,i)=>b.classList.toggle('active',['morning','evening','condition','compat'][i]===t));
  document.getElementById('advice-content').innerHTML=renderAdviceContent();
}
function renderAdviceContent() {
  if(currentAdviceTab==='morning') return renderRoutine('morning');

}
function renderRoutine(tod) {
  const lbl=tod==='morning'?'早':'晚';

  return `<div class="card"><div class="card-title">💡 ${lbl}間保養流程</div><div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;">根據你的 <b style="color:var(--purple)">${state.skin.type}</b> 和目前保養品，AI 規劃最佳${lbl}間步驟。</div><button class="submit-btn" onclick="genRoutine('${tod}')">✨ 生成${lbl}間保養流程</button></div><div id="routine-result-${tod}"></div>`;
}
function renderRoutineResult(steps,tod) {
  const lbl=tod==='morning'?'☀ 早':'🌙 晚';
  return `<div class="card"><div class="card-title">${lbl}間保養流程</div>${steps.map((s,i)=>`<div class="routine-step"><div class="step-num">${i+1}</div><div class="step-body"><div class="step-title">${s.step}</div><div class="step-desc">${s.how}</div>${s.product?`<div class="step-product">推薦：${s.product}</div>`:''}</div></div>`).join('')}<button class="ghost-btn" onclick="clearRoutine('${tod}')">重新生成</button></div>`;
}
async function genRoutine(tod) {
  const el=document.getElementById('routine-result-'+tod);

  const prods=state.products.map(p=>`${p.brand} ${p.name}（${p.category}，成分：${p.ingredients||'未知'}）`).join('；');
  try {
    const raw=await callClaude(`使用者是${state.skin.type}，困擾：${state.skin.concerns.join('、')}。保養品：${prods}。規劃${tod==='morning'?'早':'晚'}間保養步驟，最多6步。只回純JSON：[{"step":"步驟名","how":"操作說明1-2句","product":"推薦產品名或空字串"}]`);

function clearRoutine(tod) { window['_routine_'+tod]=null; document.getElementById('advice-content').innerHTML=renderAdviceContent(); }

function renderCompat() {

// ── ADD MODAL ──────────────────────────────────────────────
function openAdd() {
  addMode='search'; searchResults=[]; selectedResult=null; currentImgData=null; window._photoInfo=null;
  showModal(buildAddModal());
}
function showModal(html) { document.getElementById('modal-root').innerHTML=html; }
function closeModal() { document.getElementById('modal-root').innerHTML=''; currentImgData=null; window._photoInfo=null; }

function buildAddModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hd"><span class="modal-title">新增保養品</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="tabs">
      <button class="tab-btn ${addMode==='search'?'active':''}" onclick="setAddMode('search')">🔍 搜尋</button>
      <button class="tab-btn ${addMode==='photo'?'active':''}" onclick="setAddMode('photo')">📷 照片</button>
      <button class="tab-btn ${addMode==='manual'?'active':''}" onclick="setAddMode('manual')">✏️ 手動</button>
    </div>
    <div id="add-mode-body">${buildAddModeBody()}</div>
    <hr class="divider">
    <div id="add-form-body">${buildAddFormBody()}</div>
    <button class="submit-btn" id="add-submit" onclick="confirmAdd()" disabled>加入產品庫</button>
  </div></div>`;
}
function setAddMode(m){addMode=m;searchResults=[];selectedResult=null;showModal(buildAddModal());}
function buildAddModeBody() {
  if(addMode==='search') return `<div class="search-wrap"><input class="search-input" id="sq" placeholder="例：SK-II 神仙水、Cetaphil 乳液..." onkeydown="if(event.key==='Enter')doSearch()"><button class="search-btn" id="sbtn" onclick="doSearch()">搜尋</button></div><div id="ss"></div><div id="sr">${searchResults.map(buildRcard).join('')}</div>`;
  if(addMode==='photo') return `<div class="upload-area"><input type="file" accept="image/*" onchange="handlePhoto(event)">${currentImgData?`<img src="${currentImgData}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:16px;">`:`<div class="upload-icon">📷</div><div class="upload-text">點擊上傳或拍照</div>`}</div><div id="photo-status"></div>`;
  return `<p style="font-size:12px;color:var(--text2);margin-bottom:6px;">直接填寫下方資訊</p>`;
}
function buildRcard(r,i) {
  return `<div class="rcard ${selectedResult===i?'sel':''}" id="rc${i}" onclick="pickResult(${i})">
    <div class="rcard-name">${r.emoji||'🧴'} ${r.name}${selectedResult===i?' <span style="color:var(--purple);font-size:11px;font-weight:600;">✓ 已選</span>':''}</div>
    <div class="rcard-brand">${r.brand}</div>
    <div class="rcard-desc">${r.desc||''}</div>
    <div class="rcard-tags">${(r.tags||[]).map(t=>`<span class="rtag">${t}</span>`).join('')}</div>
  </div>`;
}
function buildAddFormBody() {
  const r=selectedResult!=null?searchResults[selectedResult]:{};
  return `
    <span class="fl">品牌</span><input class="fi" id="fb" placeholder="例：Laneige" value="${r.brand||''}" oninput="checkAddBtn()">
    <span class="fl">產品名稱</span><input class="fi" id="fn" placeholder="例：水凝保濕乳霜" value="${r.name||''}" oninput="checkAddBtn()">
    <div class="form-row">
      <div><span class="fl">類別</span><input class="fi" id="fc" placeholder="乳霜、精華..." value="${r.category||''}"></div>
      <div><span class="fl">主要成分（選填）</span><input class="fi" id="fing" placeholder="玻尿酸、維他命C..." value="${r.ingredients||''}"></div>
    </div>
    <div class="form-row">
      <div><span class="fl">開封日期</span><input class="fi" type="date" id="fd" value="${today()}"></div>
      <div><span class="fl">PAO（開封後月數）</span><input class="fi" type="number" id="fp" placeholder="12" min="1" max="36" value="${r.pao||''}"></div>
    </div>`;
}
function checkAddBtn(){const b=(document.getElementById('fb')||{}).value||'',n=(document.getElementById('fn')||{}).value||'';const btn=document.getElementById('add-submit');if(btn)btn.disabled=!(b.trim()&&n.trim());}

async function doSearch() {
  const q=(document.getElementById('sq')||{}).value||'';
  if(!q.trim()||isSearching) return;
  isSearching=true;
  const btn=document.getElementById('sbtn'),ss=document.getElementById('ss');
  if(btn)btn.disabled=true;
  if(ss)ss.innerHTML=`<div class="sbox sloading">🔍 查詢「${q}」中 <span class="dot-anim">●</span></div>`;
  try {
    const raw=await callClaude(`你是保養品專家資料庫。搜尋：「${q}」。回傳最多3個符合的真實保養品，只回純JSON：[{"brand":"","name":"","category":"","pao":月數,"emoji":"","desc":"功效1句","tags":["標籤"],"advice":"使用建議1-2句","ingredients":"主要成分逗號分隔"}]`);
    searchResults=parseJSON(raw); selectedResult=null;
    if(ss)ss.innerHTML=`<div class="sbox ssuccess">✓ 找到 ${searchResults.length} 個結果，點選後自動填入</div>`;
    const sr=document.getElementById('sr');
    if(sr)sr.innerHTML=searchResults.map(buildRcard).join('');
  } catch { if(ss)ss.innerHTML=`<div class="sbox swarn">查詢失敗，請換關鍵字或改用手動輸入</div>`; }
  isSearching=false; if(btn)btn.disabled=false;
}
function pickResult(i) {
  selectedResult=i; const r=searchResults[i];
  searchResults.forEach((_,j)=>{const el=document.getElementById('rc'+j);if(el){el.classList.toggle('sel',j===i);el.querySelector('.rcard-name').innerHTML=`${_.emoji||'🧴'} ${_.name}${j===i?' <span style="color:var(--purple);font-size:11px;font-weight:600;">✓ 已選</span>':''}`;}}); 
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('fb',r.brand||'');set('fn',r.name||'');set('fc',r.category||'');set('fp',r.pao||12);set('fing',r.ingredients||'');
  checkAddBtn();
}
function handlePhoto(e) {
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    currentImgData=ev.target.result;
    const base64=currentImgData.split(',')[1],mime=currentImgData.split(';')[0].split(':')[1];
    const ua=document.querySelector('.upload-area');
    if(ua)ua.innerHTML=`<input type="file" accept="image/*" onchange="handlePhoto(event)"><img src="${currentImgData}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:16px;">`;
    const ps=document.getElementById('photo-status');
    if(ps)ps.innerHTML=`<div class="sbox sloading">AI 辨識中 <span class="dot-anim">●</span></div>`;
    try {
      const res=await fetch(API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:base64}},{type:'text',text:'辨識此保養品，只回純JSON：{"brand":"","name":"","category":"","pao":12,"emoji":"","advice":"1-2句","ingredients":"主要成分"}'}]}]})});
      const data=await res.json();
      const info=JSON.parse((data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').replace(/```json|```/g,'').trim());
      window._photoInfo=info;
      const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
      set('fb',info.brand||'');set('fn',info.name||'');set('fc',info.category||'');set('fp',info.pao||12);set('fing',info.ingredients||'');
      if(ps)ps.innerHTML=`<div class="sbox ssuccess">✓ 辨識完成，請確認資料</div>`;
      checkAddBtn();
    } catch{if(ps)ps.innerHTML=`<div class="sbox swarn">辨識失敗，請手動填寫</div>`;}
  };
  reader.readAsDataURL(file);
}
function confirmAdd() {
  const g=id=>((document.getElementById(id)||{}).value||'').trim();
  const brand=g('fb'),name=g('fn');
  if(!brand||!name)return;
  const src=selectedResult!=null?searchResults[selectedResult]:(window._photoInfo||{});
  state.products.push({id:state.nextId++,brand,name,category:g('fc')||'其他',ingredients:g('fing')||'',openedDate:g('fd')||today(),pao:parseInt(g('fp'))||12,emoji:src.emoji||'🧴',advice:src.advice||'',imgData:addMode==='photo'?currentImgData:null});
  saveState();closeModal();render();
}

  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hd"><span class="modal-title">產品詳情</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="det-hero">${p.imgData?`<img src="${p.imgData}">`:(p.emoji||'🧴')}</div>
    <div class="det-brand">${p.brand}</div>
    <div class="det-name">${p.name}</div>
    <div class="det-row"><span class="det-k">類別</span><span class="det-v">${p.category}</span></div>
    <div class="det-row"><span class="det-k">開封日期</span><span class="det-v">${fmt(p.openedDate)}</span></div>
    <div class="det-row"><span class="det-k">建議用完日期</span><span class="det-v">${exp.toISOString().split('T')[0].replace(/-/g,'/')}</span></div>
    <div class="det-row"><span class="det-k">效期狀態</span><span class="det-v"><span class="tag ${tagCls(s)}">${d<0?'已過期':'還有 '+d+' 天'}</span></span></div>
    ${p.ingredients?`<div class="det-row"><span class="det-k">主要成分</span><span class="det-v" style="font-size:11px;text-align:right;max-width:60%;">${p.ingredients}</span></div>`:''}
    ${p.advice?`<div class="infobox infobox-purple"><div class="infobox-title">✨ AI 使用建議</div><div class="infobox-body">${p.advice}</div></div>`:''}
    <button class="del-btn" onclick="deleteProduct(${p.id})">刪除此產品</button>
  </div></div>`);
}
function deleteProduct(id){if(!confirm('確定要刪除？'))return;state.products=state.products.filter(p=>p.id!==id);saveState();closeModal();render();}

// ── PWA ────────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  window.addEventListener('load',()=>navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));
}

render();
</script>
</body>
</html>
